<!DOCTYPE html>
<html>
<head>
    <title>Gym Members</title>
</head>
<body>
    <h1>All Members</h1>
    <a href="/members/add">+ Add New Member</a>
    <ul>
        {% for member in members %}
            <li>
                {{ member['name'] }} — {{ member['phone'] }} (Joined: {{ member['join_date'] }})
                <a href="/members/edit/{{ member['id'] }}">Edit</a>
                <a href="/members/delete/{{ member['id'] }}">Delete</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
