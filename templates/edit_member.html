<!DOCTYPE html>
<html>
<head>
    <title>Edit Member</title>
</head>
<body>
    <h1>Edit Member</h1>
    <form method="POST" action="/members/edit/{{ member['id'] }}">
        <label>Name:</label><br>
        <input type="text" name="name" value="{{ member['name'] }}" required><br><br>

        <label>Phone:</label><br>
        <input type="text" name="phone" value="{{ member['phone'] }}"><br><br>

        <label>Join Date:</label><br>
        <input type="date" name="join_date" value="{{ member['join_date'] }}" required><br><br>

        <label>Plan:</label><br>
        <select name="plan_id" required>
            {% for plan in plans %}
                <option value="{{ plan['id'] }}" {% if plan['id'] == member['plan_id'] %}selected{% endif %}>
                    {{ plan['plan_name'] }} - Rs. {{ plan['price'] }}
                </option>
            {% endfor %}
        </select><br><br>

        <button type="submit">Save Changes</button>
    </form>
</body>
</html>
